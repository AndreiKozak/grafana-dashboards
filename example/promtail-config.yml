---
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: 'warn'

positions:
  filename: /tmp/positions.yaml

clients:
  - url: https://example.com/loki/api/v1/push
    external_labels:
      machine: 'dev.example.com'
      delivery: 'promtail'
      env: 'dev'

scrape_configs:
  - job_name: all_containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*log  # for linux only
    pipeline_stages:
      - json:
          expressions:
            stream: stream
            attrs: attrs
            tag: attrs.tag
            time: time
            log: log
      - timestamp:
          source: time
          format: RFC3339Nano
      - regex:
          expression: ^(?P<image>([^|]+))\|(?P<app>([^|]+))$
          source: "tag"
      - labels:
          app:
          image:
      - output:
          source: log

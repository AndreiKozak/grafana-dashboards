---
services:
  app:
    image: myapp
    container_name: myapp
    restart: always
    logging:
      driver: "json-file"
      options:
        tag: "{{.ImageName}}|{{.Name}}"
        max-file: "5"
        max-size: "500m"
  promtail:
    container_name: promtail
    image: grafana/promtail
    restart: always
    labels:
      - 'logtarget=loki'
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers
